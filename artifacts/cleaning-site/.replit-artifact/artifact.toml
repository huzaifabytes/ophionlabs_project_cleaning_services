kind = "web"
previewPath = "/"
title = "CleanPro Website"
version = "1.0.0"
id = "artifacts/cleaning-site"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22467

[services.development]
run = "pnpm --filter @workspace/cleaning-site run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/cleaning-site", "run", "build" ]
serve = "static"
publicDir = "artifacts/cleaning-site/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22467"
BASE_PATH = "/"
